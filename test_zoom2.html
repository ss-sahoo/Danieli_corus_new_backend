<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body>
    <h1>Test Zoom</h1>
    <p>This is a test.</p>
    <button onclick="zoomPage(0.1)">Zoom In</button>
    <button onclick="zoomPage(-0.1)">Zoom Out</button>

    <script>
        let currentZoom = 1;
        function zoomPage(delta) {
            currentZoom += delta;
            if (currentZoom < 0.2) currentZoom = 0.2;
            document.body.style.zoom = currentZoom;
        }
    </script>
</body>
</html>
